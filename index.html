<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Who's That Pokémon?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Scrolling Stars and scanline retro overlays -->
  <div class="stars-background"></div>
  <div class="scanlines"></div>

  <main class="game-container">
    <div class="scoreboard">
      <div class="score-box">
        <span class="label">SCORE</span>
        <span id="score" class="val">00</span>
      </div>
      <div class="score-box">
        <span class="label">STREAK</span>
        <span id="streak" class="val streak-val">x0</span>
      </div>
      <div class="score-box">
        <span class="label">HIGH SCORE</span>
        <span id="high-score" class="val">00</span>
      </div>
    </div>

    <h1 class="logo-text">WHO'S THAT POKÉMON?</h1>
    
    <!-- Outer CRT bezel frame -->
    <div class="screen-outer-wrapper">
      <div class="screen-bezel">
        <!-- LED indicator lights -->
        <div class="screen-led red-led"></div>
        <div class="screen-led green-led"></div>
        
        <div class="display-screen">
          <div id="loader" class="loader"></div>
          <img id="pokemon-image" src="" alt="Mystery Pokemon" class="pokemon-image silhouette hidden">
        </div>
      </div>
    </div>

    <div class="status-panel">
      <p id="status-message">Make your guess!</p>
      <div id="hint-display" class="hint-display hidden">
        <span id="hint-text" class="hint-tag">Type: Unknown</span>
      </div>
    </div>
    
    <div class="choices-grid" id="choices-container">
      <button class="choice-btn" data-index="0" disabled>Loading...</button>
      <button class="choice-btn" data-index="1" disabled>Loading...</button>
      <button class="choice-btn" data-index="2" disabled>Loading...</button>
      <button class="choice-btn" data-index="3" disabled>Loading...</button>
    </div>

    <div class="controls-row">
      <button id="hint-btn" class="control-btn hint-btn" disabled>Reveal Hint</button>
      <button id="skip-btn" class="control-btn skip-btn" disabled>Skip Round</button>
      <button id="sound-btn" class="control-btn sound-btn">Sound: ON</button>
    </div>
    
    <p id="result-message"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
