<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Who's That Pokémon?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>Who's That Pokémon?</h1>
    
    <div class="image-container">
      <!-- Image is set dynamically by JS -->
      <img id="pokemon-image" src="" alt="Mystery Pokemon" class="pokemon-image hidden">
    </div>
    
    <div class="choices-grid" id="choices-container">
      <button class="choice-btn" data-index="0">Loading...</button>
      <button class="choice-btn" data-index="1">Loading...</button>
      <button class="choice-btn" data-index="2">Loading...</button>
      <button class="choice-btn" data-index="3">Loading...</button>
    </div>
    <p id="result-message"></p>
  </div>
  <script src="app.js"></script>
</body>
</html>
