<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Who's That Pokémon?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>Who's That Pokémon?</h1>
    
    <div class="image-container">
      <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png" alt="Mystery Pokemon" class="pokemon-image">
    </div>
    
    <div class="choices-grid" id="choices-container">
      <button class="choice-btn">Bulbasaur</button>
      <button class="choice-btn">Charmander</button>
      <button class="choice-btn">Pikachu</button>
      <button class="choice-btn">Squirtle</button>
    </div>
    <p id="result-message"></p>
  </div>
  <script src="app.js"></script>
</body>
</html>
